<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بارکردنی ڤیدیۆ — Upload Video</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body{direction:rtl;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex flex-col items-center justify-center p-6">
    <div class="max-w-lg w-full bg-white/95 backdrop-blur rounded-3xl shadow-2xl overflow-hidden p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">وەرگێڕدراوی ڤیدیۆ</h1>
            <p class="text-gray-500">کوردی سۆرانی بکە بە عەرەبی</p>
        </div>

        <form id="uploadForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">ID یStore</label>
                <input type="number" id="storeId" value="1" min="1"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">فایلی ڤیدیۆ</label>
                <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:border-indigo-400 transition-colors cursor-pointer"
                     onclick="document.getElementById('videoFile').click()">
                    <input type="file" id="videoFile" accept="video/*" class="hidden" onchange="handleFileSelect(this)">
                    <div id="fileInfo" class="text-gray-500">
                        <p class="text-4xl mb-2">🎬</p>
                        <p>کلیک بکە بۆ هەڵبژاردنی ڤیدیۆ</p>
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full py-4 px-6 bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-400 disabled:cursor-not-allowed text-white font-bold rounded-xl transition-all duration-200">
                بارکردن و وەرگێڕدراو
            </button>
        </form>

        <div id="progressSection" class="hidden mt-6">
            <div class="bg-gray-100 rounded-xl p-4">
                <div class="flex justify-between mb-2">
                    <span id="jobStatus" class="text-sm font-medium text-gray-700">چاوەروان...</span>
                    <span id="jobId" class="text-sm text-gray-500"></span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2">
                    <div id="progressBar" class="bg-indigo-600 h-2 rounded-full transition-all" style="width: 0%"></div>
                </div>
                <p id="statusDetail" class="text-xs text-gray-400 mt-2">ڤیدیۆ دەکرێتەوە...</p>
            </div>
        </div>

        <div id="resultSection" class="hidden mt-6">
            <div id="successMessage" class="hidden bg-green-50 border border-green-200 rounded-xl p-4 text-center">
                <p class="text-green-700 font-semibold mb-2">✓ ڤیدیۆ ئامادەیە!</p>
                <a id="downloadLink" href="#" download
                    class="inline-block mt-2 px-6 py-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl">
                    داگرتنەوەی ڤیدیۆ
                </a>
            </div>
            <div id="errorMessage" class="hidden bg-red-50 border border-red-200 rounded-xl p-4 text-center">
                <p id="errorText" class="text-red-700">هەڵەیەک ڕوویدا</p>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;
        let pollInterval = null;

        function handleFileSelect(input) {
            selectedFile = input.files[0];
            if (selectedFile) {
                const size = (selectedFile.size / (1024 * 1024)).toFixed(2);
                document.getElementById('fileInfo').innerHTML = `
                    <p class="text-2xl mb-1">🎬</p>
                    <p class="text-indigo-600 font-medium">${selectedFile.name}</p>
                    <p class="text-gray-400 text-sm">${size} MB</p>
                `;
            }
        }

        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!selectedFile) {
                alert('تکایە ڤیدیۆیەک هەڵبژێرە');
                return;
            }

            const storeId = document.getElementById('storeId').value;
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'باردەکرێت...';

            const formData = new FormData();
            formData.append('store_id', storeId);
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/video/jobs', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.detail || 'هەڵەیەک ڕوویدا');
                }

                document.getElementById('progressSection').classList.remove('hidden');
                document.getElementById('jobId').textContent = `Job #${result.id}`;

                pollJobStatus(result.id);

            } catch (error) {
                showError(error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'هەوڵیدەمەوە';
            }
        });

        async function pollJobStatus(jobId) {
            const statusEl = document.getElementById('statusDetail');
            const progressBar = document.getElementById('progressBar');

            pollInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/video/jobs/${jobId}`);
                    const status = await response.json();

                    statusEl.textContent = `دۆخ: ${status.status}`;

                    if (status.status === 'processing') {
                        progressBar.style.width = '50%';
                    }

                    if (status.status === 'completed') {
                        progressBar.style.width = '100%';
                        clearInterval(pollInterval);
                        showSuccess(status.output_path);
                    } else if (status.status === 'failed') {
                        clearInterval(pollInterval);
                        showError(status.error || 'ڤیدیۆ وەرگێڕدراوەکە سەرکەوتوو نەبوو');
                    }
                } catch (error) {
                    clearInterval(pollInterval);
                    showError(error.message);
                }
            }, 3000);
        }

        function showSuccess(outputPath) {
            document.getElementById('progressSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
            document.getElementById('successMessage').classList.remove('hidden');
            document.getElementById('errorMessage').classList.add('hidden');
            document.getElementById('downloadLink').href = `/video/jobs/${outputPath}`;
        }

        function showError(message) {
            document.getElementById('progressSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
            document.getElementById('successMessage').classList.add('hidden');
            document.getElementById('errorMessage').classList.remove('hidden');
            document.getElementById('errorText').textContent = message;
        }
    </script>
</body>
</html>
